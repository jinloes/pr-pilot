name: Release Plugins

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build And Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            webview/package-lock.json
            vscode-extension/package-lock.json

      - name: Build IntelliJ plugin
        run: ./gradlew :intellij-plugin:buildPlugin

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile VS Code extension
        working-directory: vscode-extension
        run: npm run build

      - name: Prune VS Code extension dev dependencies
        working-directory: vscode-extension
        run: npm prune --omit=dev

      - name: Package VS Code extension
        working-directory: vscode-extension
        run: npm run stage:webview && npx --yes @vscode/vsce package --out pr-pilot-${{ github.ref_name }}.vsix

      - name: Mark release channel from tag
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.channel.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            intellij-plugin/build/distributions/*
            vscode-extension/*.vsix




